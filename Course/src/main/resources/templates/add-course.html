<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Course</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; }
        .container { max-width: 450px; margin: 50px auto; background: #fff;
                     padding: 30px; border-radius: 8px; box-shadow: 0 0 10px #ddd; }
        h2 { text-align: center; color: #333; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input[type=text], input[type=number], input[type=file] {
            width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box;
        }
        button { margin-top: 20px; width: 100%; padding: 10px; background: #007bff;
                 color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        a { display: block; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Add New Course</h2>
    <form th:action="@{/courses/save}" method="post" enctype="multipart/form-data">
        <label>Course Name</label>
        <input type="text" name="courseName" required>

        <label>Course Duration</label>
        <input type="text" name="courseDuration" placeholder="e.g. 3 Months" required>

        <label>Course Price</label>
        <input type="number" step="0.01" name="coursePrice" required>

        <label>Course Image</label>
        <input type="file" name="imageFile" accept="image/*" required>

        <button type="submit">Save Course</button>
    </form>
    <a th:href="@{/courses/list}">View All Courses</a>
</div>
</body>
</html>
