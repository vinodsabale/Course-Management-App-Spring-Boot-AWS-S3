<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Course List</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; }
        .container { max-width: 900px; margin: 40px auto; }
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #007bff; color: #fff; }
        img { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; }
        a.btn { display: inline-block; margin-bottom: 15px; padding: 8px 15px;
                background: #28a745; color: #fff; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
<div class="container">
    <h2>All Courses</h2>
    <a class="btn" th:href="@{/courses/add}">+ Add New Course</a>
    <table>
        <tr>
            <th>Image</th><th>Name</th><th>Duration</th><th>Price</th>
        </tr>
        <tr th:each="course : ${courses}">
            <td><img th:src="${course.courseImageUrl}" alt="course image"></td>
            <td th:text="${course.courseName}"></td>
            <td th:text="${course.courseDuration}"></td>
            <td th:text="${course.coursePrice}"></td>
        </tr>
    </table>
</div>
</body>
</html>
